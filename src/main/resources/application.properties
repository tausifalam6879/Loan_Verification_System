spring.application.name=VerificationSystem

# Default local/demo database. This keeps the app runnable even when MySQL credentials are not configured.
# File-based H2 keeps registered users, JWT-backed sessions, and expenses available after backend restarts.
spring.datasource.url=jdbc:h2:file:./data/verification_system_local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate ORM Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Port
server.port=8081

# JWT Configuration
jwt.secret=MySuperSecretKeyForLoanVerificationSystem2026JwtToken

# OTP/email settings. Local default uses console fallback OTP unless SMTP/Twilio is configured.
app.otp.enabled=${APP_OTP_ENABLED:true}
app.otp.console-fallback.enabled=${APP_OTP_CONSOLE_FALLBACK_ENABLED:true}
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.sms.enabled=${APP_SMS_ENABLED:false}
app.whatsapp.enabled=${APP_WHATSAPP_ENABLED:false}

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT:10000}

twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.sms-from=${TWILIO_SMS_FROM:}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:}

# Optional Python AI/Data Science service. Start ai-fraud-service on port 8000.
app.ai.service-url=${AI_SERVICE_URL:http://localhost:8000}

# Optional live chatbot provider. Keep API keys in environment variables, never in React code.
app.llm.provider=${LLM_PROVIDER:local}
app.llm.model=${LLM_MODEL:}
app.llm.timeout-ms=${LLM_TIMEOUT_MS:15000}
app.llm.ollama-base-url=${OLLAMA_BASE_URL:http://localhost:11434}
app.llm.local-base-url=${LOCAL_LLM_BASE_URL:http://localhost:11434/v1}
app.llm.local-api-key=${LOCAL_LLM_API_KEY:}
app.llm.openai-api-key=${OPENAI_API_KEY:}
app.llm.gemini-api-key=${GEMINI_API_KEY:}
