spring.datasource.url=jdbc:h2:mem:verification_system_local;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.otp.enabled=${APP_OTP_ENABLED:true}
app.otp.console-fallback.enabled=${APP_OTP_CONSOLE_FALLBACK_ENABLED:true}
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.sms.enabled=${APP_SMS_ENABLED:false}
app.whatsapp.enabled=${APP_WHATSAPP_ENABLED:false}
